<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPay - Quick Digital Payments</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; opacity: 0.8; transition: opacity 0.3s; }
        nav a:hover { opacity: 1; }
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; animation: fadeInUp 1s ease; }
        .hero p { font-size: 1.2rem; margin-bottom: 2rem; max-width: 600px; animation: fadeInUp 1s ease 0.2s both; }
        .methods { display: flex; gap: 2rem; max-width: 800px; margin: 2rem 0; }
        .method-card { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; text-align: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; flex: 1; }
        .method-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .method-card h3 { margin-bottom: 1rem; }
        .qr-scanner { position: relative; width: 200px; height: 200px; margin: 1rem auto; border: 3px solid #00ff88; border-radius: 10px; background: #000; display: flex; align-items: center; justify-content: center; color: #00ff88; font-size: 1rem; }
        .scan-btn { background: #00ff88; color: black; border: none; padding: 1rem 2rem; border-radius: 50px; font-weight: bold; cursor: pointer; transition: transform 0.3s; margin-top: 1rem; }
        .scan-btn:hover { transform: scale(1.05); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .methods { flex-direction: column; } .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">EcoPay</div>
        <nav>
            <a href="#card">Card</a>
            <a href="#qr">QR Scan</a>
            <a href="#upi">UPI</a>
        </nav>
    </header>
    <section class="hero">
        <h1>Pay Smarter, Go Green</h1>
        <p>Secure, fast payments for your eco-friendly services. Choose your method below.</p>
        <div class="methods">
            <div class="method-card" id="card">
                <h3>💳 Card Payment</h3>
                <p>Quick checkout with cards</p>
                <button class="scan-btn" onclick="openPayment(500)">Pay ₹500</button>
            </div>
            <div class="method-card" id="qr">
                <h3>📱 QR Scan</h3>
                <div class="qr-scanner">Scan QR Here<br>(Demo)</div>
                <button class="scan-btn" onclick="simulateScan()">Scan & Pay</button>
            </div>
        </div>
    </section>

    <script>
        // Razorpay options (same as before)
        var razorpayOptions = {
            "key": "rzp_test_SQZDv0qJhZKof9",  // Replace with your rzp_test_xxx
            "amount": "50000",  // ₹500
            "currency": "INR",
            "name": "EcoPay",
            "description": "Eco Service Payment",
            "prefill": { "name": "Customer", "email": "customer@ecopay.in" },
            "theme": {"color": "#667eea"},
            "handler": function(response) {
                alert("✅ Payment Success!\nID: " + response.razorpay_payment_id);
                console.log(response);
            }
        };

        function openPayment(amount) {
            razorpayOptions.amount = (amount * 100).toString();
            var rzp = new Razorpay(razorpayOptions);
            rzp.open();
        }

        function simulateScan() {
            // Dummy QR scan animation
            document.querySelector('.qr-scanner').innerHTML = '🟢 Scanning... Success!';
            setTimeout(() => {
                document.querySelector('.qr-scanner').innerHTML = 'Scan QR Here<br>(Demo)';
                openPayment(500);  // Triggers same Razorpay
            }, 1500);
        }
    </script>
</body>
</html>
