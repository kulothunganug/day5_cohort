<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - LearnHub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="student.html" class="brand">LearnHub</a>
            <div class="nav-links">
                <span id="user-name">Loading...</span>
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="course-details-content">
            <!-- Details loaded here -->
        </div>

        <div class="grid grid-cols-1 grid-cols-2 mt-4">
            <div class="card">
                <h3>Lessons</h3>
                <div id="lessons-list" class="mt-4">
                    <!-- Lessons loaded here -->
                </div>
            </div>
            <div class="card" id="video-area">
                <h3>Lesson Viewer</h3>
                <div id="video-container" class="mt-4 text-center" style="background: #000; height: 300px; display: flex; align-items: center; justify-content: center; color: #fff;">
                    Select a lesson to watch
                </div>
                <div id="purchase-overlay" class="hidden mt-4 text-center">
                    <p class="mb-4">You need to purchase this course to view lessons.</p>
                    <button id="buy-btn" class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
