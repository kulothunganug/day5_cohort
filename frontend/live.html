<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Class Chat - LearnHub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #chat-window {
            height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            padding: 1rem;
            margin-bottom: 1rem;
            background: var(--white);
            border-radius: 0.5rem;
        }
        .message {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.25rem;
            background: #f9fafb;
        }
        .message .user { font-weight: bold; color: var(--primary); font-size: 0.8rem; }
        .message .time { color: var(--text-muted); font-size: 0.7rem; margin-left: 0.5rem; }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="student.html" class="brand">LearnHub Live</a>
            <div class="nav-links">
                <span id="user-name">Loading...</span>
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h2 id="live-topic">Live Class Chat</h2>
        <div id="chat-window">
            <!-- Messages here -->
        </div>
        <form id="chat-form" style="display: flex; gap: 0.5rem;">
            <input type="text" id="chat-input" placeholder="Type a message..." required style="flex: 1;">
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/live.js"></script>
</body>
</html>
