<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard - LearnHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="instructor.html" class="brand">LearnHub Instructor</a>
            <div class="nav-links">
                <span id="user-name">Loading...</span>
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="grid grid-cols-1 mb-4">
            <div class="card">
                <h2>Create New Course</h2>
                <form id="create-course-form" class="mt-4">
                    <div class="form-group">
                        <label for="title">Course Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="price">Price (INR)</label>
                        <input type="number" id="price" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Course</button>
                </form>
            </div>
        </div>

        <h2>My Courses</h2>
        <div id="courses-list" class="grid grid-cols-1 grid-cols-2 grid-cols-3 mt-4">
            <!-- Courses will be loaded here -->
        </div>
    </div>

    <!-- Modals -->
    <div id="lesson-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Add Lesson to <span id="modal-course-title"></span></h3>
            <form id="add-lesson-form" class="mt-4">
                <input type="hidden" id="modal-course-id">
                <div class="form-group">
                    <label for="lesson-title">Lesson Title</label>
                    <input type="text" id="lesson-title" required>
                </div>
                <div class="form-group">
                    <label for="video-url">Video URL</label>
                    <input type="url" id="video-url" required>
                </div>
                <div class="form-group">
                    <label for="order">Order</label>
                    <input type="number" id="order" value="1" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Add Lesson</button>
                    <button type="button" onclick="closeModal('lesson-modal')" class="btn btn-outline">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="live-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Schedule Live Class</h3>
            <form id="create-live-form" class="mt-4">
                <input type="hidden" id="live-course-id">
                <div class="form-group">
                    <label for="live-topic">Topic</label>
                    <input type="text" id="live-topic" required>
                </div>
                <div class="form-group">
                    <label for="live-desc">Description</label>
                    <textarea id="live-desc"></textarea>
                </div>
                <div class="form-group">
                    <label for="scheduled-at">Scheduled At</label>
                    <input type="datetime-local" id="scheduled-at" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Schedule</button>
                    <button type="button" onclick="closeModal('live-modal')" class="btn btn-outline">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/instructor.js"></script>
</body>
</html>
