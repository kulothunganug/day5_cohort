<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Online Course Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="brand">LearnHub</a>
            <div class="nav-links">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="register.html" class="btn btn-primary">Join for Free</a>
            </div>
        </div>
    </nav>

    <div class="container text-center" style="padding-top: 5rem;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">Master New Skills Today</h1>
        <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2rem;">
            Join thousands of students learning from expert instructors worldwide.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="register.html?role=student" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem;">Start Learning</a>
            <a href="register.html?role=instructor" class="btn btn-outline" style="padding: 1rem 2rem; font-size: 1.1rem;">Become an Instructor</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Auto redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user) {
                if (user.role === 'instructor') {
                    window.location.href = 'instructor.html';
                } else {
                    window.location.href = 'student.html';
                }
            }
        });
    </script>
</body>
</html>
