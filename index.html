<!DOCTYPE html>
<html>
<head>
<title>Learn Hub Portal</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

<h1 class="brand">LearnHub</h1>

<h2 id="title">Welcome Back</h2>
<p id="subtitle">Login to continue</p>

<div class="tabs">
<button id="loginTab" class="active" onclick="showSection('login')">Login</button>
<button id="registerTab" onclick="showSection('register')">Register</button>
</div>

<!-- LOGIN -->

<div id="loginSection">

<select id="loginRole">
<option value="student">Student</option>
<option value="instructor">Instructor</option>
</select>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="loginUser" placeholder="Username">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="loginPass" placeholder="Password">
<i class="fa fa-eye toggle" onclick="togglePassword('loginPass',this)"></i>
</div>

<button class="btn" onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>


<!-- REGISTER -->

<div id="registerSection" style="display:none">

<select id="regRole">
<option value="student">Student</option>
<option value="instructor">Instructor</option>
</select>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="regUser" placeholder="Username">
</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" id="regEmail" placeholder="Email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" id="regPass" placeholder="Password" onkeyup="checkStrength()">
<i class="fa fa-eye toggle" onclick="togglePassword('regPass',this)"></i>
</div>

<div class="strength">
<div id="strengthBar"></div>
</div>

<button class="btn" onclick="register()">Create Account</button>

<p id="regMsg"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
